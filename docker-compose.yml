services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "1"
      SECRET_KEY: change-me-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgresql://cms:cms@db:5432/cms
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      FRONTEND_DIR: /app_frontend
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/app/media
      - ./nuxt-app:/app_frontend:ro
    user: "0:0"

  frontend:
    build:
      context: ./nuxt-app
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_media: