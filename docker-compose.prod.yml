services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEBUG: ${DJANGO_DEBUG}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_URL: ${DJANGO_DATABASE_URL}
      CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      STATIC_URL: ${DJANGO_STATIC_URL}
      STATIC_ROOT: ${DJANGO_STATIC_ROOT}
      MEDIA_URL: ${DJANGO_MEDIA_URL}
      MEDIA_ROOT: ${DJANGO_MEDIA_ROOT}
      USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST}
      USE_X_FORWARDED_PROTO: ${DJANGO_USE_X_FORWARDED_PROTO}
      CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE}
      SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE}
      SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT}
      SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS}
      SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD}
    expose:
      - "8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers ${GUNICORN_WORKERS}
             --timeout ${GUNICORN_TIMEOUT}"

  frontend:
    build:
      context: ./nuxt-app
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_INTERNAL_API_BASE: ${NUXT_INTERNAL_API_BASE}
      NUXT_PUBLIC_TRACKNODE_API_KEY: ${NUXT_PUBLIC_TRACKNODE_API_KEY}
      NUXT_PUBLIC_TRACKNODE_TRACKER_SRC: ${NUXT_PUBLIC_TRACKNODE_TRACKER_SRC}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro

volumes:
  static_data:
  media_data:
